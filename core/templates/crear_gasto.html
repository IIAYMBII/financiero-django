{% extends 'base.html' %}
{% block content %}

<style>
    * {
        box-sizing: border-box;
    }

    .wrap {
        padding: 1.5rem 0;
        font-family: system-ui, sans-serif;
    }

    .accent-line {
        width: 28px;
        height: 3px;
        border-radius: 2px;
        background: #2563eb;
        margin-bottom: 8px;
    }

    .page-header h1 {
        font-size: 17px;
        font-weight: 600;
        color: #f1f5f9;
    }

    .page-header p {
        font-size: 12px;
        color: #64748b;
        margin-top: 3px;
        margin-bottom: 0;
    }

    .badge-gas {
        display: inline-flex;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 20px;
        background: #450a0a;
        color: #f87171;
        border: 1px solid #7f1d1d;
        font-weight: 600;
        margin-left: 8px;
        vertical-align: middle;
    }

    .form-card {
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 16px;
        padding: 1.75rem;
        max-width: 560px;
        margin-top: 1.5rem;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
    }

    .full {
        grid-column: 1 / -1;
    }

    @media (max-width: 600px) {
        .form-grid {
            grid-template-columns: 1fr;
        }

        .full {
            grid-column: 1;
        }
    }

    .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .field label {
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: .5px;
    }

    .field input,
    .field select {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        color: #e2e8f0;
        outline: none;
        transition: border-color .15s;
        font-family: inherit;
        width: 100%;
    }

    .field input:focus,
    .field select:focus {
        border-color: #dc2626;
    }

    .field input::placeholder {
        color: #475569;
    }

    .field select option {
        background: #1e293b;
    }

    .input-icon {
        position: relative;
    }

    .input-icon input {
        padding-left: 28px;
    }

    .input-icon .ic {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #475569;
        font-size: 14px;
        pointer-events: none;
    }

    .divider {
        height: 1px;
        background: #1e293b;
        margin-top: 18px;
    }

    .actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
    }

    .btn-save {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        background: #dc2626;
        color: #fff;
    }

    .btn-save:hover {
        background: #b91c1c;
    }

    .btn-cancel {
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: 1px solid #334155;
        background: transparent;
        color: #64748b;
        text-decoration: none;
        display: flex;
        align-items: center;
    }

    .btn-cancel:hover {
        background: #1e293b;
    }
</style>

<div class="wrap">
    <div class="page-header">
        <div class="accent-line"></div>
        <h1>Nuevo gasto <span class="badge-gas">Egreso</span></h1>
        <p>Registra un gasto en tu historial financiero</p>
    </div>

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">

                <div class="field full">
                    <label for="id_descripcion">Descripción</label>
                    {{ form.descripcion }}
                </div>

                <div class="field">
                    <label for="id_monto">Monto</label>
                    <div class="input-icon">
                        <span class="ic">$</span>
                        {{ form.monto }}
                    </div>
                </div>

                <div class="field">
                    <label for="id_fecha">Fecha</label>
                    {{ form.fecha }}
                </div>

                <div class="field full">
                    <label for="id_tipo">Tipo</label>
                    {{ form.tipo }}
                </div>

                <div class="field full">
                    <label for="id_categoria">Categoría</label>
                    {{ form.categoria }}
                </div>

            </div>

            <div class="divider"></div>
            <div class="actions">
                <a href="/" class="btn-cancel">Cancelar</a>
                <button type="submit" class="btn-save">Guardar gasto</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
